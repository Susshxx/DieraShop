services:
  - type: web
    name: dierashop-backend
    env: node
    buildCommand: npm install && npm run seed
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
    
  - type: web
    name: dierashop-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
